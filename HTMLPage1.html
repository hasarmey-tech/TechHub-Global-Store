<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

            input:focus {
                border-color: #6a11cb;
            }

        button {
            width: 100%;
            padding: 10px;
            background: #6a11cb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

            button:hover {
                background: #2575fc;
            }

        .error {
            color: red;
            display: none;
            font-size: 14px;
        }
    </style>

    <script>
        function check() {

            var user = document.getElementById("u").value;
            var pass = document.getElementById("p").value;

            if (user == "yosif" && pass == "1234") {

                alert("Welcome back");
                window.open("mainpage.html");

            } else {

                alert("Wrong username or password");
                window.close(); // بتسكر بعد ما تضغط OK

            }

        }
    </script>
</head>

<body>

    <div class="box">
        <h2>Login</h2>

        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">

        <div id="error" class="error">
            Wrong username or password
        </div>

        <button onclick="check()">Login</button>
    </div>

</body>
</html>
