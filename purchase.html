<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STARMARKET - Purchase</title>
    <link rel="stylesheet" href="style.css">

    <script>
        var str = `Invalid input
Please try again`;
        
            var str = `Invalid input
            Please try again`;

        buy = (form) => {

            if (
            form.firstName.value.match(/^[A-Za-z]{3,}$/) != null &&
            form.lastName.value.match(/^[A-Za-z]{3,}$/) != null &&
            form.cardNumber.value.match(/^[0-9]{16}$/) != null &&
            form.expiryDate.value.match(/^[0-9]{4}$/) != null &&
            form.cvv.value.match(/^[0-9]{3}$/) != null
            ) {
                window.open("purchase1.html");
            } else {
                alert(str);
            }

            return false;
        }
    </script>
</head>

<body id="top">
    <div class="container">
        <main class="main-a">
            <section>
                <h1 class="page-title">Purchase</h1>

                <form name="tofes" class="purchase-form" onsubmit="return buy(this);">
                    <table style="width: 100%;">

                        <tr>
                            <td>
                                <input type="text" name="firstName" placeholder="First Name" required
                                       style="width:550px; padding:12px; border:3px solid steelblue; border-radius:4px;">
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <input type="text" name="lastName" placeholder="Last Name" required
                                       style="width:550px; padding:12px; border:3px solid steelblue; border-radius:4px;">
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <input type="text" name="cardNumber" placeholder="Visa Card Number" required
                                       style="width:550px; padding:12px; border:3px solid steelblue; border-radius:4px;">
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <input type="text" name="expiryDate" placeholder="Expiry Date (MMYY)" required
                                       style="width:550px; padding:12px; border:3px solid steelblue; border-radius:4px;">
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <input type="text" name="cvv" placeholder="CVV" required
                                       style="width:550px; padding:12px; border:3px solid steelblue; border-radius:4px;">
                            </td>
                        </tr>

                        <tr>
                            <td style="text-align:right; padding-top:16px;">
                                <input type="submit" class="submit-a" value="Purchase">
                                <input type="reset" class="reset-a" value="Reset" style="margin-left:16px;">
                            </td>
                        </tr>

                    </table>
                </form>

            </section>
        </main>
    </div>

    <a href="#top" class="back-up">↑</a>
</body>
</html>
